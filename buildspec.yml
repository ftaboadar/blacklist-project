version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: blacklist-app
    IMAGE_TAG: latest

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install pytest pytest-cov

  pre_build:
    commands:
      - echo "Ejecutando pruebas unitarias..."
      - FLASK_ENV=testing JWT_SECRET_KEY=test-secret-key python -m pytest tests/ -v --tb=short --junitxml=reports/test-results.xml --cov=app --cov-report=xml:reports/coverage.xml --cov-report=term-missing
      - echo "Pruebas completadas exitosamente."
      - echo "Iniciando sesion en Amazon ECR..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI

  build:
    commands:
      - echo "Build iniciado en `date`"
      - echo "Construyendo la imagen Docker..."
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_URI/$IMAGE_REPO_NAME:$IMAGE_TAG

  post_build:
    commands:
      - echo "Build completado en `date`"
      - echo "Enviando imagen Docker a ECR..."
      - docker push $ECR_URI/$IMAGE_REPO_NAME:$IMAGE_TAG
      - echo "Escribiendo archivos de definicion de imagen..."
      - mkdir -p reports
      - printf '[{"name":"blacklist-app","imageUri":"%s"}]' "$ECR_URI/$IMAGE_REPO_NAME:$IMAGE_TAG" > imagedefinitions.json
      - printf '{"ImageURI":"%s"}' "$ECR_URI/$IMAGE_REPO_NAME:$IMAGE_TAG" > imageDetail.json
      - cat imagedefinitions.json

reports:
  pytest-reports:
    files:
      - reports/test-results.xml
    file-format: JUNITXML
  coverage-reports:
    files:
      - reports/coverage.xml
    file-format: COBERTURAXML

artifacts:
  files:
    - "**/*"
    - imagedefinitions.json
    - imageDetail.json
  secondary-artifacts:
    DefinitionArtifact:
      files:
        - appspec.json
        - taskdef.json
    ImageArtifact:
      files:
        - imageDetail.json

cache:
  paths:
    - /root/.cache/pip/**/*
