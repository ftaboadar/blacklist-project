# =============================================================================
# New Relic Python Agent - Configuración
# La license_key se inyecta via variable de entorno NEW_RELIC_LICENSE_KEY
# =============================================================================

[newrelic]

# La clave real se pasa como variable de entorno NEW_RELIC_LICENSE_KEY
# Dejar en blanco aquí; el agente la toma del env var automáticamente
license_key =

# Nombre de la aplicación en el dashboard de New Relic
app_name = Blacklist API

# Activar monitoreo
monitor_mode = true

# Log a stdout para que aparezca en CloudWatch
log_file = stdout
log_level = info

# SSL
ssl = true

# Seguridad
high_security = false

# ---------- Transaction Tracer ----------
transaction_tracer.enabled = true
# Umbral: apdex_f = 4x el valor de apdex_t (0.5s -> 2s)
transaction_tracer.transaction_threshold = apdex_f
# Ofuscar queries SQL en los traces (no exponer datos sensibles)
transaction_tracer.record_sql = obfuscated
transaction_tracer.stack_trace_threshold = 0.5
# Mostrar queries lentas de DB
transaction_tracer.explain_enabled = true
transaction_tracer.explain_threshold = 0.5

# ---------- Error Collector ----------
error_collector.enabled = true
error_collector.capture_source = true
# 404 no son errores de aplicación, ignorarlos
error_collector.ignore_status_codes = 404

# ---------- Apdex ----------
# Tiempo satisfactorio = 500ms (T)
# Tolerable = 4T = 2s
# Frustrado = > 4T
apdex_t = 0.5

# ---------- Distributed Tracing ----------
distributed_tracing.enabled = true

# ---------- Browser Monitoring ----------
# Desactivado: API REST sin frontend HTML
browser_monitoring.auto_instrument = false

# ---------- Thread Profiler ----------
thread_profiler.enabled = true
